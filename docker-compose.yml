services:

  postgres:
    image: postgres:16
    container_name: ai-callflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: callflow
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-callflow-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ai-callflow-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      GENERIC_TIMEZONE: Europe/Berlin
      N8N_SECURE_COOKIE: "false"
    volumes:
      - ./n8n:/home/node/.n8n

networks:
  default:
    name: ai-callflow-network

